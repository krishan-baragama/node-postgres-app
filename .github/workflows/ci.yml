name: NodeJS CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build (if exists)
        run: npm run build || echo "No build step, skipping"

      - name: Test (if exists)
        run: npm test || echo "No test defined"

      - name: Lint (if exists)
        run: npm run lint || echo "No lint defined"